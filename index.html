<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>東大阪市消防局シミュレーター</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#050505;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;overflow:hidden}
#app{height:100vh;width:100%;max-width:460px;margin:0 auto;background:#111;position:relative;overflow:hidden}
header{height:86px;padding:10px 14px;background:linear-gradient(135deg,#700000,#e53935);display:flex;justify-content:space-between;align-items:center}
h1{font-size:19px;margin:0}
#mission{font-size:13px;margin-top:4px}
#emoji{font-size:38px}
canvas{display:block;width:100%;height:calc(100vh - 222px);background:#87dfff;touch-action:none}
#hud{height:52px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:5px;background:#181818;font-size:11px}
#hud div{background:#292929;border-radius:8px;display:flex;align-items:center;justify-content:center;text-align:center}
#controls{
  position:fixed;
  left:50%;
  transform:translateX(-50%);
  bottom:calc(env(safe-area-inset-bottom) + 8px);
  width:min(100%,460px);
  height:74px;
  background:#050505;
  display:grid;
  grid-template-columns:1fr 1.7fr 1fr;
  gap:8px;
  padding:8px 10px;
  z-index:50;
}
button{height:58px;border:0;border-radius:16px;font-size:22px;font-weight:900;background:#f2f2f2;color:#111;box-shadow:inset 0 -3px 0 rgba(0,0,0,.25)}
#waterBtn{background:#1976d2;color:#fff;font-size:26px}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100}
.panel{background:#fff;color:#111;border-radius:22px;padding:22px;text-align:center;width:100%}
.panel h2{margin:0 0 12px;font-size:23px}
.panel p{font-size:15px;line-height:1.55}
.panel button{background:#e53935;color:white;width:100%;margin-top:12px}
</style>
</head>
<body>
<div id="app">
<header>
  <div>
    <h1>東大阪市消防局シミュレーター</h1>
    <div id="mission">建物火災発生。放水して炎を消せ！</div>
  </div>
  <div id="emoji">🚒</div>
</header>

<canvas id="game"></canvas>

<div id="hud">
  <div>任務<br><span id="phase">消火</span></div>
  <div>点数<br><span id="score">0</span></div>
  <div>残火<br><span id="fireCount">0</span></div>
  <div>水量<br><span id="waterCount">100</span></div>
</div>

<div id="controls">
  <button id="leftBtn">◀</button>
  <button id="waterBtn">放水</button>
  <button id="rightBtn">▶</button>
</div>

<div id="overlay">
  <div class="panel">
    <h2>🚨 東大阪市消防局 出動指令</h2>
    <p>建物火災が発生。消防車を左右に動かし、中央の「放水」ボタンで炎を消してください。</p>
    <button id="startBtn">出動する</button>
  </div>
</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
const mission=document.getElementById("mission");
const phaseEl=document.getElementById("phase");
const scoreEl=document.getElementById("score");
const fireCountEl=document.getElementById("fireCount");
const waterCountEl=document.getElementById("waterCount");
const overlay=document.getElementById("overlay");

let W,H,running=false,rescueMode=false,score=0,water=100,tick=0;
let truck={x:150,y:0,w:72,h:50};
let fires=[],drops=[],victims=[],smokes=[];

function resize(){
  const r=canvas.getBoundingClientRect();
  canvas.width=r.width*devicePixelRatio;
  canvas.height=r.height*devicePixelRatio;
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  W=r.width; H=r.height;
  truck.y=H-78;
  truck.x=Math.max(4,Math.min(W-truck.w-4,truck.x));
}
window.addEventListener("resize",resize);
resize();

function rand(a,b){return Math.random()*(b-a)+a}

function updateHud(){
  phaseEl.textContent=rescueMode?"救助":"消火";
  scoreEl.textContent=score;
  fireCountEl.textContent=fires.length;
  waterCountEl.textContent=water;
}

function setup(){
  running=true;rescueMode=false;score=0;water=100;
  fires=[];drops=[];victims=[];smokes=[];
  for(let i=0;i<10;i++){
    fires.push({x:rand(45,W-45),y:rand(55,H*0.48),hp:2,size:rand(30,44)});
  }
  overlay.style.display="none";
  mission.textContent="放水ボタンで炎を消せ！";
  updateHud();
}
document.getElementById("startBtn").onclick=setup;

function move(dx){
  if(!running)return;
  truck.x=Math.max(4,Math.min(W-truck.w-4,truck.x+dx));
}

function shootWater(){
  if(!running)return;

  if(rescueMode){
    for(const v of victims){
      if(!v.saved && Math.abs((truck.x+truck.w/2)-v.x)<72){
        v.saved=true;score+=30;mission.textContent="要救助者を救出！";
      }
    }
    if(victims.every(v=>v.saved))complete();
    updateHud();
    return;
  }

  if(water<=0){
    mission.textContent="水量回復中！";
    return;
  }

  water=Math.max(0,water-2);
  for(let i=-2;i<=2;i++){
    drops.push({x:truck.x+truck.w/2+i*8,y:truck.y-8,vx:i*0.25,vy:-9,r:8});
  }
  mission.textContent="放水中！";
  updateHud();
}

function addControl(id,fn){
  const el=document.getElementById(id);
  el.addEventListener("click",fn);
  el.addEventListener("touchstart",e=>{e.preventDefault();fn();},{passive:false});
}
addControl("leftBtn",()=>move(-34));
addControl("rightBtn",()=>move(34));
addControl("waterBtn",shootWater);

canvas.addEventListener("touchmove",e=>{
  if(!running)return;
  e.preventDefault();
  const r=canvas.getBoundingClientRect();
  const x=e.touches[0].clientX-r.left;
  truck.x=Math.max(4,Math.min(W-truck.w-4,x-truck.w/2));
},{passive:false});

function startRescue(){
  rescueMode=true;
  victims=[
    {x:W*0.22,y:H*0.42,saved:false},
    {x:W*0.50,y:H*0.34,saved:false},
    {x:W*0.75,y:H*0.44,saved:false}
  ];
  mission.textContent="救助フェーズ！近くで放水ボタンを押して救助";
  updateHud();
}

function complete(){
  running=false;
  overlay.style.display="flex";
  document.querySelector(".panel h2").textContent="🏆 任務完了";
  document.querySelector(".panel p").textContent="東大阪市消防局、任務完了！ スコア："+score+"点";
  document.querySelector(".panel button").textContent="再出動する";
}

function drawScene(){
  ctx.fillStyle="#8fdfff";ctx.fillRect(0,0,W,H*0.55);

  ctx.fillStyle="#8a4500";ctx.fillRect(W*0.08,H*0.11,W*0.84,H*0.30);
  ctx.fillStyle="#3e2723";ctx.fillRect(W*0.1,H*0.14,W*0.8,H*0.08);
  ctx.fillStyle="#222";
  ctx.fillRect(W*0.18,H*0.23,W*0.18,H*0.10);
  ctx.fillRect(W*0.64,H*0.23,W*0.18,H*0.10);
  ctx.fillRect(W*0.43,H*0.31,W*0.14,H*0.10);

  ctx.fillStyle="#555";ctx.fillRect(0,H*0.55,W,H*0.45);

  ctx.fillStyle="#fff";
  ctx.font="16px sans-serif";
  ctx.fillText("東大阪市消防局",14,25);
}

function drawTruck(){
  ctx.fillStyle=tick%24<12?"#ff1744":"#1e88e5";
  ctx.fillRect(truck.x+26,truck.y-8,20,8);
  ctx.fillStyle="#d50000";ctx.fillRect(truck.x,truck.y,truck.w,truck.h);
  ctx.fillStyle="#fff";ctx.fillRect(truck.x+8,truck.y+9,20,14);ctx.fillRect(truck.x+44,truck.y+9,18,14);
  ctx.fillStyle="#111";
  ctx.beginPath();ctx.arc(truck.x+16,truck.y+49,8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(truck.x+56,truck.y+49,8,0,Math.PI*2);ctx.fill();
  ctx.font="24px serif";ctx.fillText("🚒",truck.x+19,truck.y+35);
}

function loop(){
  tick++;
  if(running && water<100 && tick%12===0){water++;updateHud()}

  drawScene();

  for(let i=smokes.length-1;i>=0;i--){
    const s=smokes[i];s.a-=0.01;s.r+=0.5;
    ctx.fillStyle="rgba(60,60,60,"+s.a+")";
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    if(s.a<=0)smokes.splice(i,1);
  }

  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];d.x+=d.vx;d.y+=d.vy;
    ctx.strokeStyle="#81d4fa";ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(truck.x+truck.w/2,truck.y);ctx.lineTo(d.x,d.y);ctx.stroke();
    ctx.fillStyle="#03a9f4";ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fill();
    if(d.y<-20)drops.splice(i,1);
  }

  if(!rescueMode){
    for(let i=fires.length-1;i>=0;i--){
      const f=fires[i];
      ctx.font=f.size+"px serif";ctx.fillText("🔥",f.x-f.size/2,f.y);
      ctx.fillStyle="rgba(0,0,0,0.25)";
      ctx.beginPath();ctx.arc(f.x,f.y-25,f.size*0.65,0,Math.PI*2);ctx.fill();

      for(let j=drops.length-1;j>=0;j--){
        const d=drops[j],dx=f.x-d.x,dy=f.y-d.y;
        if(Math.sqrt(dx*dx+dy*dy)<f.size){
          drops.splice(j,1);f.hp--;score+=5;
          if(f.hp<=0){
            smokes.push({x:f.x,y:f.y-18,r:18,a:0.35});
            fires.splice(i,1);
          }
          updateHud();break;
        }
      }
    }
    if(fires.length===0 && running)startRescue();
  }

  if(rescueMode){
    ctx.font="32px serif";
    for(const v of victims){
      if(!v.saved)ctx.fillText("🧍",v.x,v.y);
      else{ctx.fillStyle="#fff";ctx.font="14px sans-serif";ctx.fillText("救助済",v.x-12,v.y)}
    }
    ctx.font="30px serif";ctx.fillText("🚑",W-70,H-48);
  }

  drawTruck();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
