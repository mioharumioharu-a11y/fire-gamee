<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予防救急と119番通報 | 東大阪市消防局</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #10243b;
      --muted: #536171;
      --paper: #ffffff;
      --soft: #f5f8fb;
      --line: #d7e0ea;
      --red: #dc2537;
      --red-deep: #a91425;
      --blue: #075ea8;
      --blue-deep: #033c70;
      --yellow: #ffd23f;
      --green: #12805c;
      --wrong: #b42635;
      --shadow: 0 22px 60px rgba(5, 25, 48, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "YuGothic", "Meiryo", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 210, 63, 0.95) 0 7%, transparent 7% 14%),
        linear-gradient(135deg, rgba(220, 37, 55, 0.94) 0 12%, transparent 12% 24%),
        linear-gradient(90deg, rgba(7, 94, 168, 0.94), rgba(3, 60, 112, 0.96));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.12) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.09) 1px, transparent 1px),
        repeating-linear-gradient(135deg, rgba(255,255,255,0.08) 0 12px, transparent 12px 24px);
      background-size: 34px 34px, 34px 34px, auto;
      mix-blend-mode: screen;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 28px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 16px;
      align-items: center;
      color: #fff;
      margin-bottom: 18px;
    }

    .dept {
      justify-self: start;
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      padding: 10px 16px;
      border: 3px solid rgba(255,255,255,0.9);
      border-radius: 8px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
      min-width: max-content;
    }

    .dept-name {
      color: var(--blue-deep);
      font-size: 1.28rem;
      line-height: 1.25;
      font-weight: 900;
      white-space: nowrap;
    }

    h1 {
      margin: 0;
      color: #fff;
      text-align: center;
      font-size: 2.4rem;
      line-height: 1.12;
      text-shadow: 0 3px 16px rgba(0,0,0,0.28);
    }

    .counter {
      justify-self: end;
      min-width: 172px;
      padding: 9px 12px;
      border: 2px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      background: rgba(3, 42, 76, 0.62);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.16);
      text-align: right;
    }

    .counter-label {
      display: block;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.84);
    }

    .counter strong {
      display: block;
      font-size: 1.6rem;
      line-height: 1;
    }

    .shell {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: 660px;
      border: 3px solid rgba(255,255,255,0.86);
      border-radius: 8px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .mascot-side {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 18px;
      padding: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(231, 242, 253, 0.96)),
        repeating-linear-gradient(135deg, rgba(220, 37, 55, 0.11) 0 14px, transparent 14px 28px);
      border-right: 1px solid var(--line);
    }

    .mascot-card {
      display: grid;
      place-items: center;
      min-height: 300px;
    }

    .mascot-card img {
      width: min(210px, 100%);
      height: auto;
      image-rendering: auto;
      border-radius: 8px;
      filter: drop-shadow(0 16px 20px rgba(6, 37, 68, 0.20));
    }

    .side-stats {
      display: grid;
      gap: 10px;
    }

    .stat {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,0.82);
    }

    .stat span {
      display: block;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .stat strong {
      display: block;
      margin-top: 3px;
      font-size: 1.18rem;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      background:
        linear-gradient(180deg, #fff 0, #fff 64%, #f1f6fb 100%);
    }

    .status-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid var(--line);
      background: #f7fbff;
    }

    .progress-wrap {
      min-width: 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .progress {
      height: 12px;
      border-radius: 8px;
      background: #dbe6f1;
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--red), var(--yellow));
      transition: width 240ms ease;
    }

    .score-pill {
      min-width: 112px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--blue-deep);
      color: #fff;
      text-align: center;
      font-weight: 800;
    }

    .screen {
      display: none;
      min-height: 0;
    }

    .screen.active {
      display: grid;
    }

    .start-screen {
      align-content: center;
      gap: 24px;
      padding: 32px;
    }

    .start-copy {
      display: grid;
      gap: 12px;
      max-width: 760px;
    }

    .kicker {
      color: var(--red-deep);
      font-weight: 900;
      font-size: 1.05rem;
    }

    .start-copy h2 {
      margin: 0;
      font-size: 2.05rem;
      line-height: 1.25;
    }

    .start-copy p {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.7;
    }

    .mode-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      max-width: 920px;
    }

    button {
      font: inherit;
    }

    .mode-btn,
    .action-btn,
    .answer-btn {
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
    }

    .mode-btn {
      position: relative;
      min-height: 128px;
      padding: 18px;
      background: var(--blue);
      color: #fff;
      box-shadow: 0 12px 26px rgba(7, 94, 168, 0.24);
      text-align: left;
      overflow: hidden;
    }

    .mode-btn:first-child {
      background: var(--green);
      box-shadow: 0 12px 26px rgba(18, 128, 92, 0.24);
    }

    .mode-btn:nth-child(2) {
      background: var(--red);
      box-shadow: 0 12px 26px rgba(220, 37, 55, 0.24);
    }

    .mode-btn:nth-child(3) {
      background: linear-gradient(135deg, var(--blue-deep), #5f3b96);
      box-shadow: 0 12px 26px rgba(3, 60, 112, 0.26);
    }

    .mode-btn::after {
      content: attr(data-count);
      position: absolute;
      right: 12px;
      bottom: 8px;
      color: rgba(255, 255, 255, 0.16);
      font-size: 3.5rem;
      font-weight: 900;
      line-height: 1;
    }

    .mode-btn:hover,
    .action-btn:hover,
    .answer-btn:not(:disabled):hover {
      transform: translateY(-2px);
    }

    .mode-btn strong {
      position: relative;
      z-index: 1;
      display: block;
      font-size: 1.42rem;
      margin-bottom: 8px;
    }

    .mode-btn span {
      position: relative;
      z-index: 1;
      display: block;
      color: rgba(255,255,255,0.9);
      font-weight: 700;
      line-height: 1.5;
    }

    .tools-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .small-btn {
      min-height: 40px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
    }

    .quiz-screen {
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding: 26px 28px 28px;
    }

    .question-head {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .question-head .small-btn {
      margin-left: auto;
    }

    .category {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #eaf3fd;
      color: var(--blue-deep);
      font-weight: 900;
    }

    .question-no {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 6px 10px;
      border-radius: 8px;
      background: #fff4c7;
      color: #694e00;
      font-weight: 900;
    }

    .question-text {
      margin: 0;
      font-size: 1.78rem;
      line-height: 1.38;
      min-height: 4.9em;
      display: flex;
      align-items: center;
    }

    .answer-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      align-content: start;
    }

    .answer-btn {
      position: relative;
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 12px;
      align-items: center;
      min-height: 86px;
      padding: 14px;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink);
      text-align: left;
      box-shadow: 0 8px 18px rgba(7, 39, 71, 0.08);
    }

    .answer-btn:disabled {
      cursor: default;
    }

    .answer-key {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background: #e8eef5;
      color: var(--blue-deep);
      font-weight: 900;
      font-size: 1.15rem;
    }

    .answer-text {
      font-weight: 800;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .answer-btn.correct {
      border-color: var(--green);
      background: #edf9f4;
    }

    .answer-btn.correct .answer-key {
      background: var(--green);
      color: #fff;
    }

    .answer-btn.wrong {
      border-color: var(--wrong);
      background: #fff0f2;
    }

    .answer-btn.wrong .answer-key {
      background: var(--wrong);
      color: #fff;
    }

    .answer-btn.dim {
      opacity: 0.68;
    }

    .result-band {
      display: none;
      grid-template-columns: 156px 1fr auto;
      gap: 18px;
      align-items: center;
      min-height: 142px;
      padding: 16px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: #f8fbff;
    }

    .result-band.show {
      display: grid;
    }

    .illustration {
      width: 156px;
      height: 124px;
      border-radius: 8px;
      background: #fff;
      border: 1px solid #d9e5f0;
      overflow: hidden;
    }

    .illustration svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .feedback {
      min-width: 0;
    }

    .feedback h3 {
      margin: 0 0 6px;
      font-size: 1.32rem;
    }

    .feedback p {
      margin: 0;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.6;
    }

    .action-btn {
      min-width: 128px;
      min-height: 48px;
      padding: 12px 18px;
      background: var(--red);
      color: #fff;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(220, 37, 55, 0.22);
    }

    .finish-screen {
      align-content: center;
      justify-items: center;
      gap: 20px;
      padding: 34px;
      text-align: center;
    }

    .certificate {
      position: relative;
      width: min(760px, 100%);
      min-height: 940px;
      padding: 30px;
      border: 5px solid #082d62;
      border-radius: 8px;
      background: #fffdf7;
      box-shadow: 0 24px 54px rgba(7, 39, 71, 0.18);
      overflow: hidden;
      color: #082d62;
    }

    .certificate::before,
    .certificate::after {
      content: "";
      position: absolute;
      pointer-events: none;
      border-radius: 6px;
    }

    .certificate::before {
      inset: 14px;
      border: 3px solid #c7a046;
    }

    .certificate::after {
      inset: 25px;
      border: 1px solid rgba(8, 45, 98, 0.42);
    }

    .certificate-inner {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 20px;
      justify-items: center;
      min-height: 880px;
      padding: 36px 48px 34px;
      background:
        radial-gradient(circle at 50% 48%, rgba(199, 160, 70, 0.08) 0 32%, transparent 33%),
        linear-gradient(180deg, rgba(255,255,255,0.96), rgba(255,253,247,0.96));
    }

    .certificate-emblem {
      display: grid;
      place-items: center;
      width: 210px;
      height: 142px;
    }

    .certificate-emblem img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .certificate-no {
      position: absolute;
      top: 34px;
      right: 48px;
      padding: 8px 14px;
      border: 2px solid #c7a046;
      outline: 1px solid rgba(8, 45, 98, 0.22);
      outline-offset: -5px;
      border-radius: 8px;
      background: #fffdf7;
      color: #082d62;
      font-weight: 900;
      font-size: 1.18rem;
    }

    .certificate-title {
      display: grid;
      gap: 12px;
      justify-items: center;
      width: min(500px, 100%);
      padding-bottom: 16px;
      border-bottom: 2px solid #c7a046;
    }

    .certificate-title::after {
      content: "";
      width: 12px;
      height: 12px;
      margin-top: 8px;
      border: 2px solid #c7a046;
      transform: rotate(45deg);
      background: #fffdf7;
    }

    .certificate-title h2 {
      margin: 0;
      font-size: clamp(3.5rem, 8vw, 5.7rem);
      line-height: 1.04;
      color: #082d62;
    }

    .certificate-name {
      width: min(600px, 100%);
      padding: 9px 0 13px;
      border-bottom: 2px solid #c7a046;
      font-size: 2rem;
      line-height: 1.25;
      color: #082d62;
      font-weight: 900;
    }

    .certificate-body {
      margin: 0;
      width: min(620px, 100%);
      color: #10243b;
      font-size: 1.13rem;
      font-weight: 900;
      line-height: 2.0;
      word-break: keep-all;
      overflow-wrap: normal;
      line-break: strict;
    }

    .certificate-body span {
      display: block;
    }

    .certificate-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      width: min(610px, 100%);
      margin-top: auto;
      padding: 18px 0;
      border-top: 2px solid #c7a046;
      border-bottom: 2px solid #c7a046;
      color: #082d62;
      font-size: 1.18rem;
      font-weight: 900;
    }

    .certificate-meta span {
      position: relative;
    }

    .certificate-meta span + span::before {
      content: "✦";
      margin-right: 16px;
      color: #c7a046;
    }

    .certificate-footer {
      display: grid;
      justify-items: center;
      gap: 14px;
      width: 100%;
      color: #082d62;
      text-align: center;
    }

    .certificate-date {
      padding-top: 8px;
      border-top: 2px solid #c7a046;
      color: #082d62;
      font-size: 1.35rem;
      font-weight: 900;
    }

    .certificate-seal {
      color: #082d62;
      font-size: 2.1rem;
      font-weight: 900;
      line-height: 1.2;
    }

    .certificate-corner {
      position: absolute;
      width: 48px;
      height: 48px;
      pointer-events: none;
      z-index: 2;
    }

    .certificate-corner::before,
    .certificate-corner::after {
      content: "";
      position: absolute;
      background: #c7a046;
    }

    .certificate-corner::before {
      width: 32px;
      height: 3px;
    }

    .certificate-corner::after {
      width: 3px;
      height: 32px;
    }

    .corner-tl {
      top: 20px;
      left: 20px;
    }

    .corner-tr {
      top: 20px;
      right: 20px;
      transform: scaleX(-1);
    }

    .corner-bl {
      bottom: 20px;
      left: 20px;
      transform: scaleY(-1);
    }

    .corner-br {
      right: 20px;
      bottom: 20px;
      transform: scale(-1);
    }

    .finish-screen h2 {
      margin: 0;
      font-size: 2.2rem;
    }

    .finish-screen p {
      margin: 0;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.7;
      max-width: 680px;
    }

    .result-score {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .result-score span {
      padding: 10px 13px;
      border-radius: 8px;
      background: #eaf3fd;
      color: var(--blue-deep);
      font-weight: 900;
    }

    .footer-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 900px) {
      .app {
        width: min(100% - 22px, 720px);
        padding-top: 14px;
      }

      .topbar {
        grid-template-columns: 1fr auto;
      }

      h1 {
        grid-column: 1 / -1;
        grid-row: 2;
        text-align: left;
        font-size: 2rem;
      }

      .shell {
        grid-template-columns: 1fr;
      }

      .mascot-side {
        display: grid;
        grid-template-columns: 128px 1fr;
        align-items: center;
        padding: 14px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .mascot-card {
        min-height: auto;
      }

      .mascot-card img {
        width: 110px;
      }

      .side-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mode-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .question-text {
        font-size: 1.45rem;
      }

      .result-band {
        grid-template-columns: 108px 1fr;
      }

      .result-band .action-btn {
        grid-column: 1 / -1;
        justify-self: stretch;
      }

      .illustration {
        width: 108px;
        height: 94px;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .counter {
        justify-self: stretch;
        text-align: left;
      }

      .dept {
        justify-self: start;
      }

      .dept-name {
        font-size: 1.12rem;
      }

      h1 {
        font-size: 1.72rem;
      }

      .status-row {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .score-pill {
        justify-self: stretch;
      }

      .start-screen,
      .quiz-screen,
      .finish-screen {
        padding: 18px;
      }

      .mode-grid,
      .answer-grid {
        grid-template-columns: 1fr;
      }

      .start-copy h2,
      .finish-screen h2 {
        font-size: 1.55rem;
      }

      .certificate {
        min-height: 0;
        padding: 14px;
        border-width: 4px;
      }

      .certificate::before {
        inset: 8px;
        border-width: 2px;
      }

      .certificate::after {
        inset: 15px;
      }

      .certificate-inner {
        display: flex;
        flex-direction: column;
        min-height: 0;
        gap: 12px;
        padding: 24px 18px 26px;
      }

      .certificate-title h2 {
        font-size: 2.9rem;
      }

      .certificate-no {
        position: static;
        align-self: flex-end;
        font-size: 0.92rem;
        padding: 6px 10px;
      }

      .certificate-emblem {
        width: 132px;
        height: 100px;
      }

      .certificate-emblem img {
        width: 100%;
        height: 100%;
      }

      .certificate-name {
        width: 100%;
        font-size: 1.2rem;
      }

      .certificate-body {
        width: 100%;
        font-size: 0.9rem;
        line-height: 1.75;
      }

      .certificate-meta {
        display: grid;
        width: 100%;
        gap: 7px;
        padding: 12px 0;
        font-size: 0.9rem;
      }

      .certificate-meta span + span::before {
        content: none;
      }

      .certificate-date {
        font-size: 1rem;
      }

      .certificate-seal {
        font-size: 1.25rem;
      }

      .certificate-corner {
        width: 32px;
        height: 32px;
      }

      .certificate-corner::before {
        width: 22px;
      }

      .certificate-corner::after {
        height: 22px;
      }

      .question-text {
        font-size: 1.22rem;
        min-height: auto;
      }

      .answer-btn {
        min-height: 78px;
      }

      .mascot-side {

  </script>
  <script>
    (() => {
      const PARTICIPANT_STORAGE_KEY = "higashiosaka_preventive_emergency_participants";
      const CERTIFICATE_STORAGE_KEY = "higashiosaka_preventive_emergency_certificates";
      const questions = Array.isArray(window.QUIZ_QUESTIONS) ? window.QUIZ_QUESTIONS : [];
      const MODES = {
        preventive: { count: 30, label: "予防救急 30問", certificateLabel: "予防救急30問", section: "予防救急" },
        call119: { count: 15, label: "119番通報 15問", certificateLabel: "119番通報15問", section: "119番通報" },
        master: { count: 50, label: "マスター編 50問", certificateLabel: "マスター編50問", section: "all" }
      };
      const el = {
        participantCount: document.getElementById("participantCount"),
        sideTotal: document.getElementById("sideTotal"),
        sideScore: document.getElementById("sideScore"),
        progressText: document.getElementById("progressText"),
        modeText: document.getElementById("modeText"),
        progressBar: document.getElementById("progressBar"),
        scorePill: document.getElementById("scorePill"),
        startScreen: document.getElementById("startScreen"),
        quizScreen: document.getElementById("quizScreen"),
        finishScreen: document.getElementById("finishScreen"),
        categoryLabel: document.getElementById("categoryLabel"),
        questionNumber: document.getElementById("questionNumber"),
        questionText: document.getElementById("questionText"),
        answerGrid: document.getElementById("answerGrid"),
        resultBand: document.getElementById("resultBand"),
        illustration: document.getElementById("illustration"),
        feedbackTitle: document.getElementById("feedbackTitle"),
        feedbackText: document.getElementById("feedbackText"),
        nextButton: document.getElementById("nextButton"),
        quizHome: document.getElementById("quizHome"),
        finishTitle: document.getElementById("finishTitle"),
        finishScore: document.getElementById("finishScore"),
        finishRate: document.getElementById("finishRate"),
        finishRank: document.getElementById("finishRank"),
        finishMessage: document.getElementById("finishMessage"),
        certificateNumber: document.getElementById("certificateNumber"),
        certificateBody: document.getElementById("certificateBody"),
        certificateDate: document.getElementById("certificateDate"),
        printCertificate: document.getElementById("printCertificate"),
        retrySame: document.getElementById("retrySame"),
        backHome: document.getElementById("backHome")
      };

      let deck = [];
      let index = 0;
      let score = 0;
      let currentMode = "preventive";
      let currentOptions = [];
      let lastCorrectDisplayKey = "";
      let participantRegisteredThisVisit = false;
      let answered = false;

      const tips = {
        "予防救急の基本": "日ごろから危険を減らすことが、自分や家族の命を守る行動につながります。",
        "熱中症": "水分、室温、休憩を早めに確認して、しんどくなる前に予防しましょう。",
        "ヒートショック": "温度差を小さくし、入浴前後の水分と声かけで事故を防ぎましょう。",
        "窒息・誤嚥": "小さく切る、姿勢を整える、口に入る物を片付けることが大切です。",
        "転倒・転落": "明るさ、段差、敷物、コード、浴室のすべりを見直しましょう。",
        "119番通報": "落ち着いて、場所・状況・傷病者の状態を伝え、指令管制員の案内に従いましょう。",
        "マスター編": "予防、早めの気づき、必要な119番通報が命を守る行動につながります。"
      };
      const correctTitles = ["正解です", "そのとおりです", "よく確認できています", "大切なポイントです"];
      const incorrectTitles = ["見直しましょう", "ここが確認ポイントです", "もう一歩です", "落ち着いて確認しましょう"];
      const answerLeads = ["答えは", "この場面で大切なのは", "正しい対応は", "確認するポイントは"];

      function readStoredCount(key) {
        try {
          return Math.max(0, Number(localStorage.getItem(key)) || 0);
        } catch (error) {
          return 0;
        }
      }

      function writeStoredCount(key, value) {
        try {
          localStorage.setItem(key, String(value));
        } catch (error) {
          // localStorageが使えない環境では画面上だけ更新します。
        }
      }

      function writeParticipantCount(value) {
        writeStoredCount(PARTICIPANT_STORAGE_KEY, value);
        el.participantCount.textContent = String(value);
      }

      function initializeParticipantCount() {
        el.participantCount.textContent = String(readStoredCount(PARTICIPANT_STORAGE_KEY));
      }

      function registerParticipantOnce() {
        if (participantRegisteredThisVisit) return;
        participantRegisteredThisVisit = true;
        const next = readStoredCount(PARTICIPANT_STORAGE_KEY) + 1;
        writeParticipantCount(next);
      }

      function issueCertificateNumber() {
        const next = readStoredCount(CERTIFICATE_STORAGE_KEY) + 1;
        writeStoredCount(CERTIFICATE_STORAGE_KEY, next);
        return next;
      }

      function formatCertificateNumber(value) {
        return `第${String(value).padStart(4, "0")}号`;
      }

      function formatDate(date) {
        return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;
      }

      function showScreen(screen) {
        [el.startScreen, el.quizScreen, el.finishScreen].forEach((node) => {
          node.classList.toggle("active", node === screen);
        });
      }

      function shuffle(items) {
        const copy = items.slice();
        for (let i = copy.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function pickPhrase(items, q) {
        return items[(q.id + index) % items.length];
      }

      function shuffledOptionsFor(q) {
        const options = shuffle(q.options);
        const correctIndex = options.findIndex((option) => option.key === q.answer);
        const previousIndex = Number(lastCorrectDisplayKey) - 1;
        if (correctIndex >= 0 && previousIndex === correctIndex && options.length > 1) {
          const swapIndex = (correctIndex + 1) % options.length;
          [options[correctIndex], options[swapIndex]] = [options[swapIndex], options[correctIndex]];
        }
        const mapped = options.map((option, optionIndex) => ({
          ...option,
          displayKey: String(optionIndex + 1)
        }));
        const correct = mapped.find((option) => option.key === q.answer);
        lastCorrectDisplayKey = correct ? correct.displayKey : "";
        return mapped;
      }

      function startGame(mode) {
        currentMode = mode;
        const config = MODES[currentMode] || MODES.master;
        const pool = config.section === "all"
          ? questions
          : questions.filter((question) => question.section === config.section);
        index = 0;
        score = 0;
        lastCorrectDisplayKey = "";
        deck = shuffle(pool).slice(0, Math.min(config.count, pool.length));
        registerParticipantOnce();
        el.sideTotal.textContent = `${deck.length}問`;
        el.sideScore.textContent = "0問";
        el.modeText.textContent = config.label;
        showScreen(el.quizScreen);
        renderQuestion();
      }

      function currentQuestion() {
        return deck[index];
      }

      function renderQuestion() {
        const q = currentQuestion();
        answered = false;
        el.categoryLabel.textContent = q.category;
        el.questionNumber.textContent = `第${index + 1}問`;
        el.questionText.textContent = q.question;
        el.resultBand.classList.remove("show");
        el.answerGrid.innerHTML = "";
        currentOptions = shuffledOptionsFor(q);
        currentOptions.forEach((option) => {
          const button = document.createElement("button");
          button.className = "answer-btn";
          button.type = "button";
          button.dataset.key = option.key;
          button.dataset.displayKey = option.displayKey;
          button.innerHTML = `<span class="answer-key">${option.key}</span><span class="answer-text"></span>`;
          button.querySelector(".answer-key").textContent = option.displayKey;
          button.querySelector(".answer-text").textContent = option.text;
          button.addEventListener("click", () => chooseAnswer(option.key));
          el.answerGrid.appendChild(button);
        });
        updateStatus();
      }

      function chooseAnswer(key) {
        if (answered) return;
        answered = true;
        const q = currentQuestion();
        const isCorrect = key === q.answer;
        if (isCorrect) score += 1;

        [...el.answerGrid.children].forEach((button) => {
          const buttonKey = button.dataset.key;
          button.disabled = true;
          if (buttonKey === q.answer) button.classList.add("correct");
          if (buttonKey === key && !isCorrect) button.classList.add("wrong");
          if (buttonKey !== q.answer && buttonKey !== key) button.classList.add("dim");
        });

        const correct = currentOptions.find((option) => option.key === q.answer);
        el.feedbackTitle.textContent = pickPhrase(isCorrect ? correctTitles : incorrectTitles, q);
        el.feedbackText.textContent = `${pickPhrase(answerLeads, q)}「${correct.text}」。${tips[q.category] || tips[q.section] || "予防と通報のポイントを日ごろから確認しましょう。"}`;
        el.illustration.innerHTML = illustrationFor(q.category);
        el.nextButton.textContent = index + 1 >= deck.length ? "結果へ" : "次へ";
        el.resultBand.classList.add("show");
        updateStatus();
      }

      function updateStatus() {
        const total = deck.length || 0;
        const done = total ? Math.min(index + (answered ? 1 : 0), total) : 0;
        const percent = total ? Math.round((done / total) * 100) : 0;
        el.progressText.textContent = total ? `${done} / ${total}問` : "スタート待ち";
        el.progressBar.style.width = `${percent}%`;
        el.scorePill.textContent = `${score} / ${total}`;
        el.sideScore.textContent = `${score}問`;
      }

      function next() {
        if (!answered) return;
        if (index + 1 >= deck.length) {
          finishGame();
          return;
        }
        index += 1;
        renderQuestion();
      }

      function finishGame() {
        const total = deck.length;
        const rate = total ? Math.round((score / total) * 100) : 0;
        const certificateNo = issueCertificateNumber();
        const config = MODES[currentMode] || MODES.master;
        const modeLabel = config.certificateLabel;
        let rank = "予防救急チェック";
        let message = "大切なのは、迷った時に一人で抱え込まず、早めに相談や119番通報を考えることです。";
        if (rate >= 90) {
          rank = "予防救急マスター";
          message = "日ごろの予防と早めの気づきがしっかり身についています。講習の声かけ役にもぴったりです。";
        } else if (rate >= 70) {
          rank = "安全チェック上手";
          message = "大切なポイントをよく押さえています。家の中の危険な場所も一緒に見直してみましょう。";
        } else if (rate >= 50) {
          rank = "もう少しで安心";
          message = "熱中症、入浴、転倒、窒息の予防をもう一度確認すると、日常で使える力になります。";
        }
        el.certificateNumber.textContent = formatCertificateNumber(certificateNo);
        el.certificateBody.innerHTML = `<span>あなたは「${modeLabel}」を最後まで学習しました。</span><span>日ごろの予防と、緊急時の落ち着いた通報について学習したことを証します。</span>`;
        el.certificateDate.textContent = formatDate(new Date());
        el.finishScore.textContent = `得点 ${score} / ${total}`;
        el.finishRate.textContent = `正答率 ${rate}%`;
        el.finishRank.textContent = rank;
        el.finishMessage.textContent = message;
        updateStatus();
        showScreen(el.finishScreen);
      }

      function home() {
        deck = [];
        index = 0;
        score = 0;
        currentOptions = [];
        lastCorrectDisplayKey = "";
        answered = false;
        el.sideTotal.textContent = "50問";
        el.sideScore.textContent = "0問";
        el.progressText.textContent = "スタート待ち";
        el.modeText.textContent = "モード選択";
        el.progressBar.style.width = "0%";
        el.scorePill.textContent = "0 / 0";
        showScreen(el.startScreen);
      }

      function illustrationFor(category) {
        if (category === "予防救急の基本") {
          return svg(`
            <rect width="132" height="108" fill="#eef7ff"/>
            <path d="M19 57 l47 -35 47 35 v40 h-94z" fill="#ffffff" stroke="#075ea8" stroke-width="5" stroke-linejoin="round"/>
            <path d="M66 44 l24 8 v15 c0 15 -10 24 -24 30 -14 -6 -24 -15 -24 -30 v-15z" fill="#eafaf3" stroke="#12805c" stroke-width="4" stroke-linejoin="round"/>
            <path d="M56 68 l7 7 14 -18" fill="none" stroke="#12805c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="34" cy="76" r="8" fill="#bfe8ff" stroke="#075ea8" stroke-width="3"/>
            <path d="M31 72 c4 -8 6 -10 9 -15 4 8 7 11 7 17 0 6 -5 10 -10 10 -3 0 -5 -1 -6 -3" fill="#bfe8ff" stroke="#075ea8" stroke-width="3" stroke-linejoin="round"/>
            <path d="M91 81 h20 M101 71 v20" stroke="#dc2537" stroke-width="6" stroke-linecap="round"/>
          `);
        }
        if (category === "熱中症") {
          return svg(`
            <rect width="132" height="108" fill="#fff7d6"/>
